policy_version: "2026.03.01"
rate_limit:
  per_sender_per_min: 20
cooldown_seconds: 2
duplicate_window: 10
max_message_len: 1200
blocked_patterns:
  - "rm -rf"
  - "DROP TABLE"
  - "sudo reboot"
room:
  command_prefix: "/"
  start_paused: false
  global_min_interval_ms: 1500

sinks:
  jsonl_enabled: true
  jsonl_path: "logs/mirror.jsonl"
  markdown_enabled: true
  markdown_path: "logs/transcript.md"
  discord_webhook_url: ""
  discord_webhook_username: "Claw95 Archive"
